---
theme: light

server:
  address: 'tcp://0.0.0.0:9091'
  buffers:
    read: 4096
    write: 4096
  timeouts:
    read: 6s
    write: 6s
    idle: 30s

log:
  level: info
  format: text

ntp:
  disable_startup_check: true

totp:
  issuer: magnus.local
  period: 30
  skew: 1

identity_validation:
  reset_password:
    jwt_secret: /JUXF5BqBdS7uOGtDXbHyfNooq2OJJSLduD15e560J9fyJkH0Nuoxpo3ir/X5XhJrTGZlQAMzwnLxyz8rsjNQQ==

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      key_length: 32
      salt_length: 16
      memory: 65536
      parallelism: 4

access_control:
  default_policy: deny
  rules:
    - domain:
        - 'magnus.findoku.de'
      policy: one_factor
      resources:
        - '^/.*$'
    - domain:
        - 'kihub.findoku.de'
      policy: one_factor
      resources:
        - '^/.*$'

session:
  secret: ranUDJ6nyDQkmLwzv2/JFqWyiXZtn2Z4YWCg8VtCSHVa2Sf+H2hpYDzdAOuiPJeW1kq7ZvOZnAL1/3YJf7VbAQ==
  expiration: 1h
  inactivity: 5m
  cookies:
    - domain: 'findoku.de'
      authelia_url: 'https://auth.findoku.de'
      default_redirection_url: 'https://magnus.findoku.de'
  
  redis:
    host: 127.0.0.1
    port: 6379

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
