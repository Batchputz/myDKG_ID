services:
  # Authelia authentication server (reachable locally for Traefik)
  authelia:
    image: docker.io/authelia/authelia:latest
    container_name: mydkg-authelia
    network_mode: host
    volumes:
      - ./authelia:/config
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped

  # Redis session store for Authelia
  redis:
    image: docker.io/redis:alpine
    container_name: mydkg-redis
    network_mode: host
    environment:
      - SKIP_FIX_PERMS=1
    volumes:
      - ./redis:/data
    command: redis-server --bind 127.0.0.1 --save 60 1 --loglevel warning
    restart: unless-stopped
